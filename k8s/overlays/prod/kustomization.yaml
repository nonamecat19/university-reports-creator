apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-auth
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: service-auth
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-gateway
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: service-gateway