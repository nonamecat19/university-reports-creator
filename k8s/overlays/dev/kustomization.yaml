apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-auth
      spec:
        template:
          spec:
            containers:
              - name: service-auth
                imagePullPolicy: Never
    target:
      kind: Deployment
      name: service-auth
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-document
      spec:
        template:
          spec:
            containers:
              - name: service-document
                imagePullPolicy: Never
    target:
      kind: Deployment
      name: service-document
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-files
      spec:
        template:
          spec:
            containers:
              - name: service-files
                imagePullPolicy: Never
    target:
      kind: Deployment
      name: service-files
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: service-gateway
      spec:
        template:
          spec:
            containers:
              - name: service-gateway
                imagePullPolicy: Never
    target:
      kind: Deployment
      name: service-gateway