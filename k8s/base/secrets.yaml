apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: university-reports
type: Opaque
stringData:
  JWT_SECRET: "your-secret-key-change-in-production"
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/auth?sslmode=disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: document-secrets
  namespace: university-reports
