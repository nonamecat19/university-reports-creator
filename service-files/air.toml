root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -o ./tmp/server ./cmd/server"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[run]
  args = []
  env = {}
  exec_only = false
  idle_timeout = "0s"
  log = "runner-errors.log"
  poll = false
  poll_interval = "0s"
  rerun = false
  rerun_delay = "1s"
  send_interrupt = false
  stop_on_error = false
  wait_on_exit = false

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false
  close_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
